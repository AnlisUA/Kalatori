server {
    listen              443 ssl;
    server_name         wss-statemint;

    ssl_certificate     /etc/nginx/certs/statemint.crt;
    ssl_certificate_key /etc/nginx/certs/statemint.key;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_pass http://chopsticks-statemint:9000;
    }
}

