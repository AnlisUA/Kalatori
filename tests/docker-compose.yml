services:
  chopsticks-polkadot:
    build:
      context: ../chopsticks
      dockerfile: Dockerfile
    container_name: chopsticks-polkadot
    ports:
      - "8000:8000"
    volumes:
      - ../chopsticks/pd.yml:/app/config.yml
    command: ["chopsticks", "-c", "/app/config.yml", "-p", "8000", "--addr", "0.0.0.0"]
    networks:
      - kalatori-network

  wss-polkadot:
    image: nginx:alpine
    container_name: wss-polkadot
    volumes:
      - ../tests/ssl/nginx-polkadot.conf:/etc/nginx/conf.d/default.conf:ro
      - ../tests/ssl/certs:/etc/nginx/certs:ro
    depends_on:
      - chopsticks-polkadot
    ports:
      - "18000:443"
    networks:
      - kalatori-network

  chopsticks-statemint:
    build:
      context: ../chopsticks
      dockerfile: Dockerfile
    container_name: chopsticks-statemint
    ports:
      - "9000:9000"
    volumes:
      - ../chopsticks/pd-ah.yml:/app/config.yml
    command: ["chopsticks", "-c", "/app/config.yml", "-p", "9000", "--addr", "0.0.0.0"]
    networks:
      - kalatori-network

  wss-statemint:
    image: nginx:alpine
    container_name: wss-statemint
    volumes:
      - ../tests/ssl/nginx-statemint.conf:/etc/nginx/conf.d/default.conf:ro
      - ../tests/ssl/certs:/etc/nginx/certs:ro
    depends_on:
      - chopsticks-statemint
    ports:
      - "19000:443"
    networks:
      - kalatori-network

  kalatori-rust-app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: kalatori-daemon
    ports:
      - "16726:16726"
    volumes:
      - ../configs:/app/configs
      - ../tests/ssl/certs/ca.crt:/usr/local/share/ca-certificates/kalatori-ca.crt:ro
    depends_on:
      - wss-polkadot
      - wss-statemint
    environment:
      - KALATORI_HOST=0.0.0.0:16726
      - KALATORI_CONFIG=configs/chopsticks-docker-wss.toml
      - KALATORI_CA_CERT=/usr/local/share/ca-certificates/kalatori-ca.crt
      - KALATORI_SEED=bottom drive obey lake curtain smoke basket hold race lonely fit walk
      - KALATORI_RECIPIENT=5GrwvaEF5zXb26Fz9rcQpDWS57CtERHpNehXCPcNoHGKutQY
      - KALATORI_REMARK=test
    command: /bin/sh -c "update-ca-certificates >/dev/null 2>&1 || true; sleep 10 && /app/kalatori"  # update certs then start
    networks:
      - kalatori-network

  tests:
   image: node:20
   working_dir: /app
   volumes:
     - ../tests/kalatori-api-test-suite:/app
     - ../tests/ssl/certs/ca.crt:/etc/ssl/certs/kalatori-ca.crt:ro
   depends_on:
     - kalatori-rust-app
   environment:
     - DAEMON_HOST=http://kalatori-daemon:16726
     - NODE_OPTIONS=--use-openssl-ca
     - NODE_EXTRA_CA_CERTS=/etc/ssl/certs/kalatori-ca.crt
   command: /bin/sh -c "sleep 180 && yarn install && yarn test"
   networks:
     - kalatori-network

networks:
    kalatori-network:
      external: true
