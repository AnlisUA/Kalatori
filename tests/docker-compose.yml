version: '3.8'

services:
  chopsticks-asset-hub:
    build:
      context: ../chopsticks
      dockerfile: Dockerfile
    container_name: chopsticks-asset-hub
    volumes:
      - ../chopsticks/pd-ah.yml:/app/config.yml
    command: ["chopsticks", "-c", "/app/config.yml", "-p", "9000", "--host", "0.0.0.0"]
    networks:
      - kalatori-network

  kalatori-daemon:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: kalatori-daemon
    volumes:
      - ../configs/chain.json.ci:/app/configs/chain.json:ro
      - ../configs/database.json.ci:/app/configs/database.json:ro
      - ../configs/payments.json.ci:/app/configs/payments.json:ro
    secrets:
      - source: kalatori_seed
        target: /app/configs/seed.json
        mode: 0o440
    depends_on:
      - chopsticks-asset-hub
    command: /bin/sh -c "sleep 10 && /app/kalatori"  # 10-second sleep to ensure chopsticks is ready
    networks:
      - kalatori-network


  tests:
    image: node:20
    working_dir: /app
    volumes:
      - ../tests/kalatori-api-test-suite:/app
    depends_on:
      - kalatori-daemon
    environment:
      - DAEMON_HOST=http://kalatori-daemon:16726
    command: /bin/sh -c "sleep 180 && yarn install && yarn test"
    networks:
      - kalatori-network

secrets:
  kalatori_seed:
    file: ../configs/seed.json.ci

networks:
    kalatori-network:
      external: true
