name:                         Semantic PR

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize

jobs:
  main:
    # By default, these PR titles are allowed:
    # https://github.com/commitizen/conventional-commit-types
    name:                     Validate PR title
    runs-on:                  ubuntu-latest
    permissions:
      pull-requests:          write
    steps:
      # Validate GITHUB_TOKEN permissions
      - name:                 Validate GitHub Token
        run: |
          echo "Testing GITHUB_TOKEN permissions..."
          # Test basic API access
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/vnd.github.v3+json" \
               "https://api.github.com/repos/${{ github.repository }}" > /dev/null
          echo "✓ Basic API access works"
          
          # Test pull request access
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/vnd.github.v3+json" \
               "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.number }}" > /dev/null
          echo "✓ Pull request access works"
          
          echo "GITHUB_TOKEN validation completed successfully"

      # Documentation: https://github.com/amannn/action-semantic-pull-request
      - uses:                 amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            major
            feat
            fix
            chore
            docs
            style
            refactor
            test
            build
            ci
            revert
          validateSingleCommit: true
          wip: true
